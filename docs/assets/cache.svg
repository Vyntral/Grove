<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280" role="img" aria-label="Grove cache demo: 6x speedup on second run">
  <defs>
    <style><![CDATA[
      .term-bg { fill: #0a0a0c; }
      .term-border { fill: none; stroke: #27272a; stroke-width: 1; }
      .dot-r { fill: #ef4444; }
      .dot-y { fill: #f59e0b; }
      .dot-g { fill: #22c55e; }
      .title { fill: #71717a; font: 12px ui-monospace, "SF Mono", Menlo, monospace; }
      .line { font: 13px ui-monospace, "SF Mono", Menlo, monospace; opacity: 0; }
      .prompt { fill: #a1a1aa; }
      .cmd    { fill: #e4e4e7; }
      .info   { fill: #d4d4d8; }
      .red    { fill: #f87171; font-weight: 600; }
      .green  { fill: #4ade80; font-weight: 600; }
      .accent { fill: #34d399; font-weight: 700; }
      .dim    { fill: #71717a; }
      .bar-cold { fill: #ef4444; opacity: 0.85; }
      .bar-warm { fill: #22c55e; opacity: 0.95; }

      @keyframes show {
        0%, 100% { opacity: 0; }
        4%, 92%  { opacity: 1; }
      }
      @keyframes grow-cold {
        0%, 100% { width: 0; opacity: 0; }
        15%, 92% { width: 600px; opacity: 0.85; }
      }
      @keyframes grow-warm {
        0%, 100% { width: 0; opacity: 0; }
        45%, 92% { width: 100px; opacity: 0.95; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0; transform: scale(0.92); }
        55%, 92% { opacity: 1; transform: scale(1); }
      }

      .l1 { animation: show 9s ease-in-out infinite; animation-delay: 0s; }
      .l2 { animation: show 9s ease-in-out infinite; animation-delay: 0.6s; }
      .l3 { animation: show 9s ease-in-out infinite; animation-delay: 3.2s; }
      .bar1 { animation: grow-cold 9s ease-out infinite; animation-delay: 1.0s; }
      .bar2 { animation: grow-warm 9s ease-out infinite; animation-delay: 3.6s; }
      .speedup { animation: pulse 9s ease-in-out infinite; animation-delay: 4.8s; transform-origin: 380px 218px; transform-box: fill-box; }
    ]]></style>
  </defs>

  <rect class="term-bg" x="0" y="0" width="760" height="280" rx="8" />
  <rect class="term-border" x="0.5" y="0.5" width="759" height="279" rx="8" />

  <circle class="dot-r" cx="20" cy="20" r="6" />
  <circle class="dot-y" cx="40" cy="20" r="6" />
  <circle class="dot-g" cx="60" cy="20" r="6" />
  <text class="title" x="380" y="24" text-anchor="middle">grove · runtime cache</text>

  <g transform="translate(20, 56)">
    <text class="line l1">
      <tspan class="prompt">$</tspan>
      <tspan class="cmd" dx="6">bun packages/examples/src/persist.ts   </tspan>
      <tspan class="dim" dx="6">(1st run, cold cache)</tspan>
    </text>
    <text class="line l2" y="20"><tspan class="dim">  duration:</tspan><tspan class="red" dx="6">599ms</tspan></text>
    <rect class="bar1" x="100" y="32" height="14" rx="3" />
    <text x="710" y="44" class="dim line l2" font-size="11" text-anchor="end">cold</text>

    <text class="line l3" y="80">
      <tspan class="prompt">$</tspan>
      <tspan class="cmd" dx="6">bun packages/examples/src/persist.ts   </tspan>
      <tspan class="dim" dx="6">(2nd run, different process)</tspan>
    </text>
    <text class="line l3" y="100"><tspan class="dim">  duration:</tspan><tspan class="green" dx="6">99ms</tspan></text>
    <rect class="bar2" x="100" y="112" height="14" rx="3" />
    <text x="210" y="124" class="dim line l3" font-size="11">warm — cross-process hit</text>
  </g>

  <g class="speedup" text-anchor="middle">
    <text x="380" y="222" class="accent" font="bold 30px ui-monospace, 'SF Mono', Menlo, monospace">6× faster</text>
    <text x="380" y="248" class="dim" font="13px ui-monospace, 'SF Mono', Menlo, monospace">deterministic-tool cache, persistent across processes</text>
  </g>
</svg>
