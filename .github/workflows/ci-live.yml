name: ci-live

# Live integration tests against the real Anthropic API.
# Costs a few cents per run, so we don't run them on every push.
#
# Triggers:
#   - workflow_dispatch  : manual ("Run workflow" button on Actions tab)
#   - schedule           : daily at 06:00 UTC, only on the default branch
#
# Required secret:
#   - ANTHROPIC_API_KEY  : the Anthropic API key. Set under
#                          Settings → Secrets and variables → Actions.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.repository == 'Vyntral/Grove' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: live tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROVE_DIRECT_PROVIDER: "1"
          GROVE_TEST: "1"
        run: bun run test:live
