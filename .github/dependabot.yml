version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
    # Ignore major bumps for tooling — those usually need manual review
    # and a lockfile regeneration that Dependabot can't do under
    # `bun install --frozen-lockfile`.
    ignore:
      - dependency-name: "@biomejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      mcp:
        patterns:
          - "@modelcontextprotocol/*"
      tooling:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "ci"
