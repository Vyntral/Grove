version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
    groups:
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      mcp:
        patterns:
          - "@modelcontextprotocol/*"
      tooling:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "ci"
